name: Deploy Shig Server

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy, for example v0.0.1
        required: true
      target:
        description: Release target asset to deploy
        required: false
        default: x86_64-unknown-linux-gnu

concurrency:
  group: deploy-shig-server
  cancel-in-progress: false

env:
  SERVER_TARGET: ${{ inputs.target || vars.SERVER_TARGET || 'x86_64-unknown-linux-gnu' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_TARGET_DIR: ${{ secrets.SERVER_TARGET_DIR }}
      SERVER_SERVICE: ${{ vars.SERVER_SERVICE || 'shig.service' }}
      DB_BACKUP_COMMAND: ${{ secrets.DB_BACKUP_COMMAND }}

    steps:
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Download release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_TAG:-}" ]; then
            echo "RELEASE_TAG is required. For manual runs, provide workflow_dispatch input release_tag."
            exit 1
          fi

          asset_name="shig_server-${RELEASE_TAG}-${SERVER_TARGET}.tar.gz"
          mkdir -p dist

          for attempt in {1..60}; do
            if gh release download "$RELEASE_TAG" --pattern "$asset_name" --dir dist --clobber; then
              break
            fi

            echo "Release asset $asset_name is not available yet; waiting for build-and-release ($attempt/60)."
            sleep 20
          done

          test -f "dist/$asset_name"
          tar -xzf "dist/$asset_name" -C dist
          test -x "dist/shig_server-${RELEASE_TAG}-${SERVER_TARGET}/shig_server"
          echo "SERVER_BINARY=dist/shig_server-${RELEASE_TAG}-${SERVER_TARGET}/shig_server" >> "$GITHUB_ENV"

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/server_deploy_key
          chmod 600 ~/.ssh/server_deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload server binary
        shell: bash
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/server_deploy_key -p $SERVER_PORT" \
            "$SERVER_BINARY" \
            "$SERVER_USER@$SERVER_HOST:/tmp/shig_server-${GITHUB_SHA}"

      - name: Deploy and restart service
        shell: bash
        run: |
          ssh \
            -i ~/.ssh/server_deploy_key \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "SERVER_TARGET_DIR='$SERVER_TARGET_DIR' SERVER_SERVICE='$SERVER_SERVICE' DB_BACKUP_COMMAND='$DB_BACKUP_COMMAND' GITHUB_SHA='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$SERVER_TARGET_DIR/bin"

          if [ -n "${DB_BACKUP_COMMAND:-}" ]; then
            echo "Running database backup before deployment..."
            bash -lc "$DB_BACKUP_COMMAND"
          else
            echo "DB_BACKUP_COMMAND is not set; skipping database backup."
          fi

          install -m 0755 "/tmp/shig_server-${GITHUB_SHA}" "$SERVER_TARGET_DIR/bin/shig_server.new"
          mv -f "$SERVER_TARGET_DIR/bin/shig_server.new" "$SERVER_TARGET_DIR/bin/shig_server"
          rm -f "/tmp/shig_server-${GITHUB_SHA}"

          echo "Restarting $SERVER_SERVICE. Diesel migrations run during server startup."
          sudo systemctl restart "$SERVER_SERVICE"
          sleep 3
          sudo systemctl status "$SERVER_SERVICE" --no-pager
          REMOTE
